<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>nv:context OG image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #000;
      --bg-elevated: #0c0d0f;
      --bg-elevated-2: #141517;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --text-1: #f0f0f0;
      --text-2: #a8a8a8;
      --text-3: #6b6b6b;
      --brand: #7170ff;
      --brand-glow: rgba(113, 112, 255, 0.18);
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      background: var(--bg-base);
      color: var(--text-1);
      font-family: var(--font-sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    /* spotlight + dot grid background */
    .wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 60% 25%, var(--brand-glow), transparent 60%),
        radial-gradient(ellipse 1000px 700px at 40% 100%, rgba(113, 112, 255, 0.06), transparent 70%);
      pointer-events: none;
    }
    .wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 30%, transparent 80%);
      pointer-events: none;
    }
    .top, .body, .footer {
      position: relative;
      z-index: 1;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 12px var(--brand);
    }
    .top-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .body {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: 88px;
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.02em;
      max-width: 900px;
      background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.55));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(180deg, #b4bcd0, #9c9bff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 8px;
    }
    .stat {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 22px 26px;
      position: relative;
    }
    .stat::before {
      content: '';
      position: absolute;
      top: 0;
      left: 16px;
      right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    }
    .stat-num {
      font-family: var(--font-mono);
      font-size: 36px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }
    .stat-num .arrow,
    .stat-num .delta {
      color: var(--brand);
    }
    .stat-label {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-3);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .brand {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 32px;
      color: var(--text-1);
    }
    .url {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-3);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="pulse"></span>
      <span class="top-text">Launching this week</span>
    </div>

    <div class="body">
      <h1>Context engineering<br/>for engineers who <em>ship</em>.</h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">440<span class="arrow">→</span>67</div>
          <div class="stat-label">selectools CLAUDE.md · <span style="color:var(--brand)">−85%</span></div>
        </div>
        <div class="stat">
          <div class="stat-num">58<span style="color:var(--text-3)">/60</span></div>
          <div class="stat-label">leverage score · up from 49/60</div>
        </div>
        <div class="stat">
          <div class="stat-num">15.8K</div>
          <div class="stat-label">tokens saved per session · saas-platform</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">nv:context</div>
      <div class="url">github.com/johnnichev/nv-context</div>
    </div>
  </div>
</body>
</html>
